version: "3.9"

# ── Shared env snippet ─────────────────────────────────────────────────────────
x-kafka-env: &kafka-env
  KAFKA_BROKER: ${KAFKA_BROKER:-localhost:9092}
  KAFKA_BROKERS: ${KAFKA_BROKER:-localhost:9092}
  KAFKA_USER:   ${KAFKA_USER:-}
  KAFKA_PASS:   ${KAFKA_PASS:-}

services:

  # ── F3: Collection Workflow Orchestrator ───────────────────────────────────
  orchestrator:
    build:
      context: ./backend/orchestrator
      dockerfile: Dockerfile
    container_name: f3-orchestrator
    restart: unless-stopped
    environment:
      <<: *kafka-env
      PORT: 3001
      BIN_STATUS_URL:   http://bin-status:3002
      SCHEDULER_URL:    http://scheduler:3003
      NOTIFICATION_URL: http://notification:3004
    expose:
      - "3001"
    networks:
      - garabadge
    depends_on:
      bin-status:
        condition: service_healthy
      scheduler:
        condition: service_healthy
      notification:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── F3: Bin Status Service ─────────────────────────────────────────────────
  bin-status:
    build:
      context: ./backend/bin-status
      dockerfile: Dockerfile
    container_name: f3-bin-status
    restart: unless-stopped
    environment:
      <<: *kafka-env
      PORT: 3002
    expose:
      - "3002"
    networks:
      - garabadge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── F3: Scheduler Service ──────────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend/scheduler
      dockerfile: Dockerfile
    container_name: f3-scheduler
    restart: unless-stopped
    environment:
      <<: *kafka-env
      PORT: 3003
    expose:
      - "3003"
    networks:
      - garabadge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── F3: Notification Service (Socket.IO hub) ───────────────────────────────
  notification:
    build:
      context: ./backend/notification
      dockerfile: Dockerfile
    container_name: f3-notification
    restart: unless-stopped
    environment:
      <<: *kafka-env
      PORT: 3004
    expose:
      - "3004"
    networks:
      - garabadge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Legacy monolith backend (dashboard data / live map) ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: garabadge-backend
    restart: unless-stopped
    environment:
      PORT: 3099
      KAFKA_BROKER: ${KAFKA_BROKER:-localhost:9092}
      KAFKA_USER:   ${KAFKA_USER:-}
      KAFKA_PASS:   ${KAFKA_PASS:-}
    expose:
      - "3099"
    networks:
      - garabadge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3099/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js dashboard ──────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garabadge-nextjs
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    expose:
      - "3000"
    networks:
      - garabadge

  # ── Kong API Gateway (DB-less) ─────────────────────────────────────────────
  kong:
    image: kong:3.7
    container_name: garabadge-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE:          "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG:  /dev/stdout
      KONG_ADMIN_ACCESS_LOG:  /dev/stdout
      KONG_PROXY_ERROR_LOG:   /dev/stderr
      KONG_ADMIN_ERROR_LOG:   /dev/stderr
      KONG_ADMIN_LISTEN:      "0.0.0.0:8001"
    ports:
      - "8000:8000"   # public API proxy
      - "3000:3000"   # Next.js UI
      - "8001:8001"   # Kong admin
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      backend:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
      bin-status:
        condition: service_healthy
      scheduler:
        condition: service_healthy
      notification:
        condition: service_healthy
      nextjs:
        condition: service_started
    networks:
      - garabadge
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

networks:
  garabadge:
    driver: bridge
