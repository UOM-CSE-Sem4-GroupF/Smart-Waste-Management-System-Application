version: "3.9"

services:
  # ── Fastify API backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: garabadge-backend
    restart: unless-stopped
    environment:
      PORT: 3001
    expose:
      - "3001"
    networks:
      - garabadge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js frontend (UI only) ─────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garabadge-nextjs
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Browser-side: calls Kong, not the backend directly
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    expose:
      - "3000"
    networks:
      - garabadge

  # ── Kong API Gateway (DB-less) ─────────────────────────────────────────────
  kong:
    image: kong:3.7
    container_name: garabadge-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"   # public API proxy
      - "3000:3000"   # Next.js UI (proxied via Kong or direct)
      - "8001:8001"   # Kong admin (restrict in production)
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      backend:
        condition: service_healthy
      nextjs:
        condition: service_started
    networks:
      - garabadge
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

networks:
  garabadge:
    driver: bridge